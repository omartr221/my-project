services:
  - type: web
    name: v-power-tuning
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: v-power-db
          property: connectionString
    autoDeploy: false

databases:
  - name: v-power-db
    databaseName: v_power_tuning
    user: v_power_user
    plan: free