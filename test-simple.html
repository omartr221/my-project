<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار V-POWER TUNING SQLite</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f0f0f0;
            direction: rtl;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #333; text-align: center; }
        .section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f9f9f9;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #45a049; }
        input {
            width: 200px;
            padding: 8px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .result {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            white-space: pre-wrap;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .accounts {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .account {
            display: inline-block;
            background: #fff;
            margin: 3px;
            padding: 5px 10px;
            border-radius: 3px;
            border: 1px solid #ddd;
            cursor: pointer;
            font-size: 12px;
        }
        .account:hover { background: #f0f8ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 اختبار نظام V-POWER TUNING SQLite</h1>
        
        <div class="section">
            <h3>🌐 اختبار الاتصال</h3>
            <button onclick="testConnection()">اختبار الاتصال</button>
            <div id="connectionResult" class="result"></div>
        </div>

        <div class="section">
            <h3>🔐 تسجيل الدخول</h3>
            <div class="accounts">
                <strong>الحسابات المتاحة:</strong><br>
                <div class="account" onclick="fillLogin('بدوي', '0000')">بدوي/0000</div>
                <div class="account" onclick="fillLogin('ملك', '12345')">ملك/12345</div>
                <div class="account" onclick="fillLogin('هبة', '123456')">هبة/123456</div>
                <div class="account" onclick="fillLogin('روان', '1234567')">روان/1234567</div>
                <div class="account" onclick="fillLogin('الاستقبال', '11')">الاستقبال/11</div>
                <div class="account" onclick="fillLogin('فارس', 'fares123')">فارس/fares123</div>
            </div>
            <input type="text" id="username" placeholder="اسم المستخدم" value="بدوي">
            <input type="password" id="password" placeholder="كلمة المرور" value="0000">
            <button onclick="login()">تسجيل الدخول</button>
            <div id="loginResult" class="result"></div>
        </div>

        <div class="section">
            <h3>👤 معلومات المستخدم</h3>
            <button onclick="getUserInfo()">معلومات المستخدم</button>
            <div id="userResult" class="result"></div>
        </div>

        <div class="section">
            <h3>👷 العمال</h3>
            <button onclick="getWorkers()">قائمة العمال</button>
            <div id="workersResult" class="result"></div>
        </div>

        <div class="section">
            <h3>📋 المهام</h3>
            <button onclick="getTasks()">قائمة المهام</button>
            <button onclick="createTestTask()">إنشاء مهمة تجريبية</button>
            <div id="tasksResult" class="result"></div>
        </div>

        <div class="section">
            <h3>🚗 الزبائن</h3>
            <button onclick="getCustomers()">قائمة الزبائن</button>
            <button onclick="createTestCustomer()">إنشاء زبون تجريبي</button>
            <div id="customersResult" class="result"></div>
        </div>

        <div class="section">
            <h3>✅ حالة النظام</h3>
            <div id="systemStatus">⏳ في انتظار الاختبار...</div>
        </div>
    </div>

    <script>
        let isLoggedIn = false;
        
        async function makeRequest(url, options = {}) {
            try {
                const response = await fetch(url, {
                    credentials: 'include',
                    ...options
                });
                
                let data;
                try {
                    data = await response.json();
                } catch {
                    data = await response.text();
                }
                
                return {
                    ok: response.ok,
                    status: response.status,
                    data: data
                };
            } catch (error) {
                return {
                    ok: false,
                    error: error.message
                };
            }
        }

        function fillLogin(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
        }

        async function testConnection() {
            const result = document.getElementById('connectionResult');
            result.textContent = '⏳ جاري اختبار الاتصال...';
            result.className = 'result';
            
            // Test basic server response
            const response = await makeRequest('/api/workers');
            
            if (response.ok || response.status === 401) {
                result.textContent = '✅ الاتصال بالسيرفر ناجح!\nالسيرفر يعمل بشكل طبيعي';
                result.className = 'result success';
                document.getElementById('systemStatus').innerHTML = '✅ السيرفر متصل ويعمل';
                document.getElementById('systemStatus').className = 'result success';
            } else {
                result.textContent = '❌ فشل الاتصال بالسيرفر\n' + (response.error || 'خطأ غير معروف');
                result.className = 'result error';
                document.getElementById('systemStatus').innerHTML = '❌ لا يمكن الاتصال بالسيرفر';
                document.getElementById('systemStatus').className = 'result error';
            }
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const result = document.getElementById('loginResult');
            
            result.textContent = '⏳ جاري تسجيل الدخول...';
            result.className = 'result';
            
            const response = await makeRequest('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });
            
            if (response.ok) {
                isLoggedIn = true;
                result.textContent = '✅ تم تسجيل الدخول بنجاح!\n' + JSON.stringify(response.data, null, 2);
                result.className = 'result success';
                document.getElementById('systemStatus').innerHTML = '✅ تم تسجيل الدخول - النظام جاهز';
                document.getElementById('systemStatus').className = 'result success';
            } else {
                isLoggedIn = false;
                result.textContent = '❌ فشل تسجيل الدخول\n' + (response.error || JSON.stringify(response, null, 2));
                result.className = 'result error';
            }
        }

        async function getUserInfo() {
            const result = document.getElementById('userResult');
            
            if (!isLoggedIn) {
                result.textContent = '⚠️ يجب تسجيل الدخول أولاً';
                result.className = 'result error';
                return;
            }
            
            result.textContent = '⏳ جاري جلب معلومات المستخدم...';
            result.className = 'result';
            
            const response = await makeRequest('/api/user');
            
            if (response.ok) {
                result.textContent = '✅ معلومات المستخدم:\n' + JSON.stringify(response.data, null, 2);
                result.className = 'result success';
            } else {
                result.textContent = '❌ فشل جلب معلومات المستخدم\n' + (response.error || JSON.stringify(response, null, 2));
                result.className = 'result error';
            }
        }

        async function getWorkers() {
            const result = document.getElementById('workersResult');
            
            result.textContent = '⏳ جاري جلب قائمة العمال...';
            result.className = 'result';
            
            const response = await makeRequest('/api/workers');
            
            if (response.ok) {
                result.textContent = '✅ قائمة العمال:\n' + JSON.stringify(response.data, null, 2);
                result.className = 'result success';
            } else {
                result.textContent = '❌ فشل جلب قائمة العمال\n' + (response.error || JSON.stringify(response, null, 2));
                result.className = 'result error';
            }
        }

        async function getTasks() {
            const result = document.getElementById('tasksResult');
            
            result.textContent = '⏳ جاري جلب قائمة المهام...';
            result.className = 'result';
            
            const response = await makeRequest('/api/tasks');
            
            if (response.ok) {
                result.textContent = '✅ قائمة المهام:\n' + JSON.stringify(response.data, null, 2);
                result.className = 'result success';
            } else {
                result.textContent = '❌ فشل جلب قائمة المهام\n' + (response.error || JSON.stringify(response, null, 2));
                result.className = 'result error';
            }
        }

        async function getCustomers() {
            const result = document.getElementById('customersResult');
            
            result.textContent = '⏳ جاري جلب قائمة الزبائن...';
            result.className = 'result';
            
            const response = await makeRequest('/api/customers');
            
            if (response.ok) {
                result.textContent = '✅ قائمة الزبائن:\n' + JSON.stringify(response.data, null, 2);
                result.className = 'result success';
            } else {
                result.textContent = '❌ فشل جلب قائمة الزبائن\n' + (response.error || JSON.stringify(response, null, 2));
                result.className = 'result error';
            }
        }

        async function createTestTask() {
            if (!isLoggedIn) {
                document.getElementById('tasksResult').textContent = '⚠️ يجب تسجيل الدخول أولاً';
                document.getElementById('tasksResult').className = 'result error';
                return;
            }

            const testTask = {
                carModel: "أودي A4 2020",
                description: "صيانة دورية - تغيير زيت",
                estimatedTime: 60,
                repairOperations: ["تغيير زيت المحرك", "فحص الفرامل"],
                workType: "mechanical"
            };

            const response = await makeRequest('/api/tasks', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(testTask)
            });

            const result = document.getElementById('tasksResult');
            if (response.ok) {
                result.textContent = '✅ تم إنشاء المهمة التجريبية:\n' + JSON.stringify(response.data, null, 2);
                result.className = 'result success';
            } else {
                result.textContent = '❌ فشل إنشاء المهمة التجريبية\n' + (response.error || JSON.stringify(response, null, 2));
                result.className = 'result error';
            }
        }

        async function createTestCustomer() {
            if (!isLoggedIn) {
                document.getElementById('customersResult').textContent = '⚠️ يجب تسجيل الدخول أولاً';
                document.getElementById('customersResult').className = 'result error';
                return;
            }

            const testCustomer = {
                name: "أحمد محمد",
                phone: "0123456789",
                email: "ahmed@example.com"
            };

            const response = await makeRequest('/api/customers', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(testCustomer)
            });

            const result = document.getElementById('customersResult');
            if (response.ok) {
                result.textContent = '✅ تم إنشاء الزبون التجريبي:\n' + JSON.stringify(response.data, null, 2);
                result.className = 'result success';
            } else {
                result.textContent = '❌ فشل إنشاء الزبون التجريبي\n' + (response.error || JSON.stringify(response, null, 2));
                result.className = 'result error';
            }
        }

        // Test connection on page load
        window.onload = function() {
            testConnection();
        };
    </script>
</body>
</html>
