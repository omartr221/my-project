<!DOCTYPE html>
<html>
<head>
    <title>Test Form</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-group { margin: 10px 0; }
        label { display: block; margin-bottom: 5px; }
        input, select { width: 300px; padding: 8px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>اختبار إنشاء مهمة</h2>
    <form id="taskForm">
        <div class="form-group">
            <label>وصف المهمة</label>
            <input type="text" id="description" value="اختبار نموذج" required>
        </div>
        
        <div class="form-group">
            <label>نوع السيارة</label>
            <select id="carBrand" required>
                <option value="audi">Audi</option>
                <option value="seat">SEAT</option>
                <option value="skoda">Skoda</option>
                <option value="volkswagen">Volkswagen</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>موديل السيارة</label>
            <input type="text" id="carModel" value="A4 2023" required>
        </div>
        
        <div class="form-group">
            <label>رقم اللوحة</label>
            <input type="text" id="licensePlate" value="TEST123" required>
        </div>
        
        <div class="form-group">
            <label>المهندس (Worker ID)</label>
            <input type="number" id="workerId" value="17" required>
        </div>
        
        <div class="form-group">
            <label>الوقت المقدر</label>
            <input type="number" id="estimatedDuration" value="60">
        </div>
        
        <div class="form-group">
            <label>المهندس (الاسم)</label>
            <input type="text" id="engineerName" value="حسام">
        </div>
        
        <div class="form-group">
            <label>المشرف</label>
            <input type="text" id="supervisorName" value="يحيى">
        </div>
        
        <div class="form-group">
            <label>المساعد</label>
            <input type="text" id="assistantName" value="غدير" required>
        </div>
        
        <button type="submit">إنشاء المهمة</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                description: document.getElementById('description').value,
                carBrand: document.getElementById('carBrand').value,
                carModel: document.getElementById('carModel').value,
                licensePlate: document.getElementById('licensePlate').value,
                workerId: parseInt(document.getElementById('workerId').value),
                workerRole: "assistant",
                estimatedDuration: parseInt(document.getElementById('estimatedDuration').value) || null,
                engineerName: document.getElementById('engineerName').value || null,
                supervisorName: document.getElementById('supervisorName').value || null,
                assistantName: document.getElementById('assistantName').value || null
            };
            
            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                document.getElementById('result').innerHTML = 
                    '<h3>النتيجة:</h3><pre>' + JSON.stringify(result, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    '<h3>خطأ:</h3><p>' + error.message + '</p>';
            }
        });
    </script>
</body>
</html>
