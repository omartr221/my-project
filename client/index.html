    <script>
      // معالج شامل لأخطاء السكريبتات الخارجية
      window.addEventListener('error', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
      }, true);
      
      window.addEventListener('unhandledrejection', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
      }, true);
      
      // تجاوز alert لمنع رسائل الخطأ
      window.alert = function() { return true; };
      
      // إعادة توجيه فورية لصفحة تسجيل الدخول البسيطة
      window.location.replace('/go-to-login');
    </script>
  </head>

  </body>
