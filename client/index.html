<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V POWER TUNING</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .subtitle {
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        .status {
            background: rgba(76, 175, 80, 0.2);
            border: 2px solid #4CAF50;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        .btn {
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .success {
            background: rgba(76, 175, 80, 0.2);
            border: 2px solid #4CAF50;
        }
        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 2px solid #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>V POWER TUNING</h1>
        <p class="subtitle">نظام إدارة المهام والصيانة</p>
        
        <div class="status">
            <h2>✓ الصفحة تحمل بنجاح</h2>
            <p>الخادم متصل ويعمل بشكل طبيعي</p>
        </div>

        <div class="form-container">
            <h3>إنشاء مهمة جديدة</h3>
            <form id="taskForm">
                <div class="form-group">
                    <label for="description">وصف المهمة:</label>
                    <input type="text" id="description" placeholder="مثال: صيانة محرك" required>
                </div>
                
                <div class="form-group">
                    <label for="carBrand">نوع السيارة:</label>
                    <select id="carBrand" required>
                        <option value="audi">أودي</option>
                        <option value="seat">سيات</option>
                        <option value="skoda">سكودا</option>
                        <option value="volkswagen">فولكس فاجن</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="carModel">موديل السيارة:</label>
                    <input type="text" id="carModel" placeholder="مثال: A4" required>
                </div>
                
                <div class="form-group">
                    <label for="licensePlate">رقم اللوحة:</label>
                    <input type="text" id="licensePlate" placeholder="مثال: 123456" required>
                </div>
                
                <div class="form-group">
                    <label for="taskType">نوع المهمة:</label>
                    <select id="taskType" required>
                        <option value="ميكانيك">ميكانيك</option>
                        <option value="كهربا">كهربا</option>
                    </select>
                </div>
                
                <button type="submit" class="btn">إنشاء المهمة</button>
            </form>
            
            <div id="result"></div>
        </div>
    </div>

    <script>
        document.getElementById('taskForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div style="color: #4ECDC4; text-align: center;">جاري إنشاء المهمة...</div>';
            
            const formData = {
                description: document.getElementById('description').value,
                carBrand: document.getElementById('carBrand').value,
                carModel: document.getElementById('carModel').value,
                licensePlate: document.getElementById('licensePlate').value,
                taskType: document.getElementById('taskType').value,
                workerId: 17,
                workerRole: 'assistant',
                estimatedDuration: 60,
                technicians: ['غدير'],
                assistants: ['حسام'],
                repairOperation: 'صيانة عامة'
            };
            
            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <h4>✓ تم إنشاء المهمة بنجاح!</h4>
                            <p>رقم المهمة: ${result.taskNumber || result.id}</p>
                            <p>تم البدء في تتبع الوقت</p>
                        </div>
                    `;
                    document.getElementById('taskForm').reset();
                } else {
                    const errorText = await response.text();
                    resultDiv.innerHTML = `
                        <div class="result error">
                            <h4>✗ خطأ في إنشاء المهمة</h4>
                            <p>كود الخطأ: ${response.status}</p>
                            <p>التفاصيل: ${errorText}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h4>✗ خطأ في الاتصال</h4>
                        <p>لا يمكن الوصول إلى الخادم</p>
                        <p>التفاصيل: ${error.message}</p>
                    </div>
                `;
            }
        });
        
        // اختبار الاتصال عند تحميل الصفحة
        window.addEventListener('load', async function() {
            try {
                const response = await fetch('/api/workers');
                if (response.ok) {
                    const workers = await response.json();
                    console.log('Workers loaded:', workers.length);
                }
            } catch (error) {
                console.error('Connection test failed:', error);
            }
        });
    </script>
</body>
</html>
