<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V POWER TUNING - نظام إدارة المهام</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            color: white;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 2rem;
            background: rgba(0,0,0,0.2);
        }
        .logo {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            margin: 2rem 0;
        }
        .card h3 {
            margin-top: 0;
            color: #fef2f2;
        }
        .status {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }
        .button {
            background: rgba(255, 255, 255, 0.9);
            color: #dc2626;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            margin: 10px 5px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .button:hover {
            background: white;
        }
        
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .logo { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">V POWER TUNING</div>
        <div class="subtitle">نظام إدارة المهام والعمال - Replit Preview</div>
    </div>
    
    <div class="container">
        <div class="card">
            <h3>🚀 مرحباً بك في نظام V POWER TUNING!</h3>
            <div class="status">
                <p><strong>✅ الحالة:</strong> النظام يعمل بنجاح</p>
                <p><strong>🔧 الخادم:</strong> متصل وجاهز على localhost:5000</p>
                <p><strong>👥 العمال:</strong> 12 عامل مسجل</p>
                <p><strong>⚡ المزايا:</strong> اختيار متعدد للفنيين والمساعدين</p>
            </div>
            <p>Preview يعمل الآن بشكل صحيح!</p>
            <a href="javascript:location.reload()" class="button">إعادة تحميل الصفحة</a>
        </div>
    </div>
</body>
</html>
